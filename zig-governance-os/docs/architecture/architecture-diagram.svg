<svg viewBox="0 0 1100 800" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4A5568"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FAFAF7"/>
      <stop offset="1" stop-color="#F2F0E8"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1100" height="800" fill="url(#bg)"/>

  <text x="550" y="48" text-anchor="middle" font-size="28" font-weight="700" fill="#15202B">Zig System Architecture</text>
  <text x="550" y="74" text-anchor="middle" font-size="14" fill="#5B6472">One shared governance data model. Four engines. Zero disconnected modules.</text>

  <!-- Client layer -->
  <rect x="80" y="105" width="940" height="100" rx="10" fill="#15202B"/>
  <text x="550" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#D9A441" letter-spacing="1">CLIENT — WEB</text>
  <text x="550" y="155" text-anchor="middle" font-size="13" fill="#F2F0E8">Mission Control · Project Builder · Asset / Risk / Control / Evidence / Task Workspaces</text>
  <text x="550" y="178" text-anchor="middle" font-size="13" fill="#F2F0E8">Scenario Workspace · AI Command Center · Health Advisor · Executive Reporting</text>

  <line x1="550" y1="205" x2="550" y2="235" stroke="#4A5568" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="565" y="225" font-size="11" fill="#5B6472">tenant-scoped requests</text>

  <!-- API layer -->
  <rect x="80" y="240" width="940" height="80" rx="10" fill="#FFFFFF" stroke="#15202B" stroke-width="1.5"/>
  <text x="550" y="265" text-anchor="middle" font-size="13" font-weight="700" fill="#15202B" letter-spacing="1">API LAYER</text>
  <text x="550" y="290" text-anchor="middle" font-size="13" fill="#3A4250">Auth &amp; RBAC (7 roles) · Organization / Project scoping middleware · REST / RPC endpoints</text>

  <line x1="550" y1="320" x2="550" y2="345" stroke="#4A5568" stroke-width="2"/>
  <line x1="180" y1="345" x2="920" y2="345" stroke="#4A5568" stroke-width="2"/>
  <line x1="180" y1="345" x2="180" y2="365" stroke="#4A5568" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="425" y1="345" x2="425" y2="365" stroke="#4A5568" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="670" y1="345" x2="670" y2="365" stroke="#4A5568" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="920" y1="345" x2="920" y2="365" stroke="#4A5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Four engines -->
  <g>
    <rect x="80" y="370" width="200" height="170" rx="10" fill="#FFFFFF" stroke="#3E6B64" stroke-width="2"/>
    <rect x="80" y="370" width="200" height="34" rx="10" fill="#3E6B64"/>
    <text x="180" y="393" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">GOVERNANCE SCORING</text>
    <text x="180" y="425" text-anchor="middle" font-size="11" fill="#3A4250">Explainable score</text>
    <text x="180" y="445" text-anchor="middle" font-size="11" fill="#3A4250">Coverage + completeness</text>
    <text x="180" y="465" text-anchor="middle" font-size="11" fill="#3A4250">inputs, weighted formula</text>
    <text x="180" y="495" text-anchor="middle" font-size="11" fill="#5B6472">Why / what affects it /</text>
    <text x="180" y="513" text-anchor="middle" font-size="11" fill="#5B6472">how to improve it</text>
  </g>

  <g>
    <rect x="325" y="370" width="200" height="170" rx="10" fill="#FFFFFF" stroke="#3E6B64" stroke-width="2"/>
    <rect x="325" y="370" width="200" height="34" rx="10" fill="#3E6B64"/>
    <text x="425" y="393" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">FRAMEWORK ENGINE</text>
    <text x="425" y="425" text-anchor="middle" font-size="11" fill="#3A4250">ISO 27001 · SOC 2 · NIST CSF</text>
    <text x="425" y="445" text-anchor="middle" font-size="11" fill="#3A4250">CIS · HIPAA · PCI DSS</text>
    <text x="425" y="465" text-anchor="middle" font-size="11" fill="#3A4250">Control ↔ Requirement maps</text>
    <text x="425" y="495" text-anchor="middle" font-size="11" fill="#5B6472">Coverage engine /</text>
    <text x="425" y="513" text-anchor="middle" font-size="11" fill="#5B6472">Readiness engine</text>
  </g>

  <g>
    <rect x="570" y="370" width="200" height="170" rx="10" fill="#FFFFFF" stroke="#D9A441" stroke-width="2"/>
    <rect x="570" y="370" width="200" height="34" rx="10" fill="#D9A441"/>
    <text x="670" y="393" text-anchor="middle" font-size="12" font-weight="700" fill="#15202B">AI COMMAND CENTER</text>
    <text x="670" y="425" text-anchor="middle" font-size="11" fill="#3A4250">Program / Risk / Control gen</text>
    <text x="670" y="445" text-anchor="middle" font-size="11" fill="#3A4250">Mapping · Gap analysis</text>
    <text x="670" y="465" text-anchor="middle" font-size="11" fill="#3A4250">Readiness · Report · Scenario</text>
    <text x="670" y="495" text-anchor="middle" font-size="11" fill="#5B6472">Reason / data / confidence /</text>
    <text x="670" y="513" text-anchor="middle" font-size="11" fill="#5B6472">framework reference</text>
  </g>

  <g>
    <rect x="815" y="370" width="200" height="170" rx="10" fill="#FFFFFF" stroke="#D9A441" stroke-width="2"/>
    <rect x="815" y="370" width="200" height="34" rx="10" fill="#D9A441"/>
    <text x="915" y="393" text-anchor="middle" font-size="12" font-weight="700" fill="#15202B">HEALTH ADVISOR</text>
    <text x="915" y="425" text-anchor="middle" font-size="11" fill="#3A4250">Continuous gap detection</text>
    <text x="915" y="445" text-anchor="middle" font-size="11" fill="#3A4250">Assets · Risks · Controls</text>
    <text x="915" y="465" text-anchor="middle" font-size="11" fill="#3A4250">Evidence · Owners · Reviews</text>
    <text x="915" y="495" text-anchor="middle" font-size="11" fill="#5B6472">Severity / explanation /</text>
    <text x="915" y="513" text-anchor="middle" font-size="11" fill="#5B6472">action / remediation</text>
  </g>

  <!-- converge to core model -->
  <line x1="180" y1="540" x2="180" y2="565" stroke="#4A5568" stroke-width="2"/>
  <line x1="425" y1="540" x2="425" y2="565" stroke="#4A5568" stroke-width="2"/>
  <line x1="670" y1="540" x2="670" y2="565" stroke="#4A5568" stroke-width="2"/>
  <line x1="915" y1="540" x2="915" y2="565" stroke="#4A5568" stroke-width="2"/>
  <line x1="180" y1="565" x2="915" y2="565" stroke="#4A5568" stroke-width="2"/>
  <line x1="550" y1="565" x2="550" y2="595" stroke="#4A5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Core data model -->
  <rect x="130" y="600" width="840" height="150" rx="10" fill="#15202B"/>
  <text x="550" y="630" text-anchor="middle" font-size="13" font-weight="700" fill="#D9A441" letter-spacing="1">CORE DATA MODEL — UNIVERSAL GOVERNANCE MODEL</text>
  <text x="550" y="665" text-anchor="middle" font-size="15" font-weight="600" fill="#FFFFFF">Organization → Project → Asset → Risk → Control →</text>
  <text x="550" y="690" text-anchor="middle" font-size="15" font-weight="600" fill="#FFFFFF">Framework Requirement → Evidence → Task → Report</text>
  <text x="550" y="722" text-anchor="middle" font-size="12" fill="#9AA5B1">Row-level tenant isolation on every table · no orphaned entities · no disconnected modules</text>

  <text x="550" y="780" text-anchor="middle" font-size="11" fill="#9AA5B1">Zig — AI-Native Governance Operating System</text>
</svg>
